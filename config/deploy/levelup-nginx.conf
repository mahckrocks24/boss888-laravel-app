# ════════════════════════════════════════════════════════════════════
# LevelUp Growth Platform — Nginx Configuration
# Target: Digital Ocean Droplet (Ubuntu 24.04, PHP 8.3-FPM)
#
# Domains served:
#   app.levelupgrowth.io     → Laravel SaaS app (React SPA + API)
#   levelupgrowth.io         → Marketing site (Laravel Blade)
#   admin.levelupgrowth.io   → Admin panel (Laravel Blade)
#
# SSL: Let's Encrypt via Certbot
# Deploy: /var/www/levelup (symlinked releases)
#
# Install:
#   sudo cp levelup-nginx.conf /etc/nginx/sites-available/levelup
#   sudo ln -s /etc/nginx/sites-available/levelup /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ════════════════════════════════════════════════════════════════════

# Rate limit zones
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/m;

# ── Upstream PHP-FPM ─────────────────────────────────────────────
upstream php-fpm {
    server unix:/var/run/php/php8.3-fpm.sock;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen 80;
    server_name levelupgrowth.io www.levelupgrowth.io app.levelupgrowth.io admin.levelupgrowth.io;
    return 301 https://$host$request_uri;
}

# ── Marketing site: levelupgrowth.io ─────────────────────────────
server {
    listen 443 ssl http2;
    server_name levelupgrowth.io www.levelupgrowth.io;

    ssl_certificate     /etc/letsencrypt/live/levelupgrowth.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/levelupgrowth.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/levelup/public;
    index index.php;
    charset utf-8;

    # Security headers (Laravel also sets these, nginx is belt-and-suspenders)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Static files — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health check — no rate limit
    location /api/health {
        try_files $uri /index.php?$query_string;
        access_log off;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
    }

    location ~ /\.(?!well-known).* { deny all; }

    access_log /var/log/nginx/levelup-marketing.access.log;
    error_log  /var/log/nginx/levelup-marketing.error.log;
}

# ── SaaS App + API: app.levelupgrowth.io ────────────────────────
server {
    listen 443 ssl http2;
    server_name app.levelupgrowth.io;

    ssl_certificate     /etc/letsencrypt/live/levelupgrowth.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/levelupgrowth.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/levelup/public;
    index index.php;
    charset utf-8;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # React app assets — immutable cache (hashed filenames)
    location /app-react/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Stripe webhook — higher rate limit, no auth
    location /api/webhook/stripe {
        limit_req zone=webhook burst=10 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # Auth endpoints — strict rate limit (prevent brute force)
    location ~* ^/api/auth/(login|register)$ {
        limit_req zone=auth burst=3 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # General API — 60 req/min
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # Health check — no rate limit, no log
    location /api/health {
        try_files $uri /index.php?$query_string;
        access_log off;
    }

    location /api/ping {
        try_files $uri /index.php?$query_string;
        access_log off;
    }

    # Exec-api for APP888
    location /exec-api/ {
        limit_req zone=api burst=30 nodelay;
        try_files $uri /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        # Pass real client IP from DO load balancer
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
    }

    location ~ /\.(?!well-known).* { deny all; }

    access_log /var/log/nginx/levelup-app.access.log;
    error_log  /var/log/nginx/levelup-app.error.log;
}

# ── Admin panel: admin.levelupgrowth.io ─────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.levelupgrowth.io;

    ssl_certificate     /etc/letsencrypt/live/levelupgrowth.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/levelupgrowth.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/levelup/public;
    index index.php;
    charset utf-8;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # IP allowlist — restrict admin to known IPs (update for your team)
    # allow 1.2.3.4;    # Shukran office
    # allow 5.6.7.8;    # VPN
    # deny all;

    location = /favicon.ico { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* { deny all; }

    access_log /var/log/nginx/levelup-admin.access.log;
    error_log  /var/log/nginx/levelup-admin.error.log;
}
