version: '3.8'

services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: boss888root
      MYSQL_DATABASE: boss888
      MYSQL_USER: boss888
      MYSQL_PASSWORD: boss888pass
    volumes:
      - boss888_mysql:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - boss888_redis:/data

volumes:
  boss888_mysql:
  boss888_redis:
